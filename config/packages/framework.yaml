framework:
    secret: '%env(APP_SECRET)%'
    handle_all_throwables: true

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    csrf_protection: true

    php_errors:
        log: true

when@dev:
    framework:
        profiler:
            only_exceptions: false

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file