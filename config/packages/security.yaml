# config/packages/security.yaml
security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class:    App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        health:
            pattern: ^/api/v1/health
            security: false

        api_auth:
            pattern: ^/api/v1/auth
            stateless: true
            json_login:
                check_path:         /api/v1/auth/login
                username_path:      email
                password_path:      password
                success_handler:    lexik_jwt_authentication.handler.authentication_success
                failure_handler:    lexik_jwt_authentication.handler.authentication_failure

        api:
            pattern:   ^/api
            stateless: true
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider

    access_control:
        - { path: ^/api/v1/auth,            roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/health,          roles: PUBLIC_ACCESS }
        - { path: ^/api/v1/admin,           roles: ROLE_ADMIN }
        - { path: ^/api/v1,                 roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: plaintext
