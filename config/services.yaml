# config/services.yaml
parameters:
    app.ai_model:          '%env(AI_MODEL)%'
    app.embedding_model:   '%env(EMBEDDING_MODEL)%'
    app.ai_provider:       '%env(AI_PROVIDER)%'
    app.ollama_base_url:   '%env(OLLAMA_BASE_URL)%'
    app.aws_bedrock_region: '%env(AWS_BEDROCK_REGION)%'
    app.s3_bucket:         '%env(AWS_S3_BUCKET)%'
    app.aws_region:        '%env(AWS_REGION)%'
    app.feature.ai_tutor:  '%env(bool:FEATURE_AI_TUTOR)%'
    app.feature.smart_search: '%env(bool:FEATURE_SMART_SEARCH)%'
    app.feature.predictive_retention: '%env(bool:FEATURE_PREDICTIVE_RETENTION)%'
    app.feature.document_to_course: '%env(bool:FEATURE_DOCUMENT_TO_COURSE)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            string $model: '%app.ai_model%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # -------------------------------------------------------------------------
    # AI Client — controlled by AI_PROVIDER env var
    # Supported: openai, ollama, claude, gemini, bedrock
    # -------------------------------------------------------------------------
    App\AI\AIClientInterface:
        factory: ['App\Factory\AIClientFactory', 'create']
        arguments:
            $provider:         '%app.ai_provider%'
            $openaiApiKey:     '%env(OPENAI_API_KEY)%'
            $ollamaBaseUrl:    '%app.ollama_base_url%'
            $anthropicApiKey:  '%env(ANTHROPIC_API_KEY)%'
            $geminiApiKey:     '%env(GEMINI_API_KEY)%'
            $awsBedrockRegion: '%app.aws_bedrock_region%'

    # -------------------------------------------------------------------------
    # AWS SDK
    # -------------------------------------------------------------------------
    Aws\S3\S3Client:
        arguments:
            - version: 'latest'
              region:  '%app.aws_region%'

    Aws\Sqs\SqsClient:
        arguments:
            - version: 'latest'
              region:  '%app.aws_region%'

    Aws\TranscribeService\TranscribeServiceClient:
        arguments:
            - version: 'latest'
              region:  '%app.aws_region%'

    Aws\Ses\SesClient:
        arguments:
            - version: 'latest'
              region:  '%app.aws_region%'

    # -------------------------------------------------------------------------
    # PDF Parser
    # -------------------------------------------------------------------------
    Smalot\PdfParser\Parser: ~

    # -------------------------------------------------------------------------
    # AI Services — bind model overrides explicitly where needed
    # -------------------------------------------------------------------------
    App\Service\AI\AITutorService:
        arguments:
            $model: '%app.ai_model%'

    App\Service\AI\SmartSearchService:
        arguments:
            $model:          '%app.ai_model%'
            $embeddingModel: '%app.embedding_model%'

    App\Service\AI\DocumentToCourseService:
        arguments:
            $model: '%app.ai_model%'

    App\Service\Analytics\PredictiveRetentionService:
        arguments:
            $model: '%app.ai_model%'

    App\Service\Analytics\SkillGapMappingService:
        arguments:
            $model: '%app.ai_model%'

    # -------------------------------------------------------------------------
    # S3 Service
    # -------------------------------------------------------------------------
    App\Service\Storage\S3Service:
        arguments:
            $bucket: '%app.s3_bucket%'
            $region: '%app.aws_region%'