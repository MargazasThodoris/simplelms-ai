##############################################################################
# TalentLMS AI — GitHub Actions CI/CD Pipeline
# On push to main: Test → Build → Push ECR → Deploy to ECS
##############################################################################
name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION:       eu-west-1
  ECR_REGISTRY:     ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-1.amazonaws.com
  APP_IMAGE_NAME:   talentlms/app
  WORKER_IMAGE_NAME: talentlms/worker
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ##############################################################################
  # 1. Code Quality & Tests
  ##############################################################################
  test:
    name: Tests & Static Analysis
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       talentlms_test
          POSTGRES_USER:     talentlms
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, redis, zip, intl, mbstring, opcache, gd
          coverage: xdebug

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Lint PHP
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: Static Analysis (PHPStan level 8)
        run: vendor/bin/phpstan analyse src tests --level 8

      - name: Setup test environment
        env:
          DATABASE_URL: postgresql://talentlms:test@localhost:5432/talentlms_test
          REDIS_URL: redis://localhost:6379
          APP_ENV: test
          APP_SECRET: test_secret_32_characters_long_xx
          OPENAI_API_KEY: sk-test-fake-key-for-tests-only
        run: |
          php bin/console doctrine:migrations:migrate --no-interaction --env=test
          php bin/console doctrine:fixtures:load --no-interaction --env=test

      - name: Run test suite
        env:
          DATABASE_URL: postgresql://talentlms:test@localhost:5432/talentlms_test
          REDIS_URL: redis://localhost:6379
          APP_ENV: test
          APP_SECRET: test_secret_32_characters_long_xx
          OPENAI_API_KEY: sk-test-fake-key-for-tests-only
        run: vendor/bin/phpunit --coverage-clover coverage.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  ##############################################################################
  # 2. Build & Push Docker Images to ECR
  ##############################################################################
  build:
    name: Build & Push Images
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      app_image:    ${{ steps.meta-app.outputs.tags }}
      worker_image: ${{ steps.meta-worker.outputs.tags }}
      image_tag:    ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push App image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.APP_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.APP_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ##############################################################################
  # 3. Deploy to ECS (rolling update)
  ##############################################################################
  deploy:
    name: Deploy to Production ECS
    needs: build
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Run DB migrations (one-off ECS task)
        run: |
          aws ecs run-task \
            --cluster talentlms-cluster \
            --task-definition talentlms-worker \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.PRIVATE_SUBNET_IDS }}],securityGroups=[${{ secrets.APP_SG_ID }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"worker","command":["php","bin/console","doctrine:migrations:migrate","--no-interaction"]}]}' \
            --wait-for-task-to-stop

      - name: Update App ECS service
        run: |
          aws ecs update-service \
            --cluster talentlms-cluster \
            --service talentlms-app \
            --force-new-deployment \
            --task-definition talentlms-app

      - name: Update Worker ECS service
        run: |
          aws ecs update-service \
            --cluster talentlms-cluster \
            --service talentlms-worker \
            --force-new-deployment \
            --task-definition talentlms-worker

      - name: Wait for App service stability
        run: |
          aws ecs wait services-stable \
            --cluster talentlms-cluster \
            --services talentlms-app

      - name: Deployment summary
        run: |
          echo "✅ Deployed image tag: ${{ needs.build.outputs.image_tag }}"
          echo "🌐 Environment: production"
          echo "🕐 Deployed at: $(date -u)"
